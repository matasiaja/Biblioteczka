<style>
  :root{
    --bg:#14161A; --surface:#1C1F26; --surface-2:#262A33; --border:#333844;
    --text:#ECEDEF; --text-dim:#9AA0AC;
    --accent:#7C5CFF; --accent-dim:#6247CC;
    --ok:#3DDC84; --warn:#FFB020; --danger:#FF4D4D;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:78px;}
  header.topbar{position:sticky;top:0;z-index:10;background:rgba(20,22,26,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
  header.topbar h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px;}
  header.topbar .sub{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}
  main{flex:1;padding:16px;}
  nav.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(28,31,38,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;max-width:520px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);}
  nav.bottom button{flex:1;background:none;border:none;color:var(--text-dim);padding:12px 4px 10px;font-family:inherit;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color .15s;}
  nav.bottom button.active{color:var(--accent);}
  nav.bottom button svg{width:20px;height:20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 18px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;width:100%;transition:background .15s,transform .1s;}
  .btn:active{transform:scale(.98);}
  .btn:hover{background:var(--accent-dim);}
  .btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .btn.danger{background:var(--danger);}
  .btn.small{width:auto;padding:9px 14px;font-size:13px;}
  .btn svg{width:18px;height:18px;flex-shrink:0;}
  .icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:color .15s,background .15s;}
  .icon-btn svg{width:20px;height:20px;}
  .icon-btn:hover{color:var(--text);background:var(--surface-2);}
  .icon-btn.active{color:var(--accent);}
  input,select,textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px 12px;font-family:inherit;font-size:14px;margin-bottom:10px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:5px;font-family:'IBM Plex Mono',monospace;}
  .row{display:flex;gap:10px;}
  .row>*{flex:1;}
  .badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;}
  .badge.ok{background:rgba(61,220,132,.15);color:var(--ok);}
  .badge.warn{background:rgba(255,176,32,.15);color:var(--warn);}
  .badge.danger{background:rgba(255,77,77,.15);color:var(--danger);}
  .item-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;}
  .item-row:last-child{border-bottom:none;}
  .item-row .name{font-weight:500;font-size:14px;}
  .item-row .meta{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .empty{text-align:center;color:var(--text-dim);padding:40px 20px;font-size:13px;}
  .empty svg{width:40px;height:40px;opacity:.4;margin-bottom:10px;}
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tabs button{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);border-radius:9px;padding:9px;font-family:inherit;font-size:12px;cursor:pointer;}
  .tabs button.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  /* scanner */
  #reader{width:100%;border-radius:var(--radius);overflow:hidden;background:#000;position:relative;}
  .scan-frame{position:relative;}
  .scan-hint{text-align:center;color:var(--text-dim);font-size:12px;margin-top:12px;font-family:'IBM Plex Mono',monospace;}
  .laser{position:absolute;left:8%;right:8%;top:50%;height:2px;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:sweep 1.8s ease-in-out infinite;pointer-events:none;z-index:5;}
  @keyframes sweep{0%,100%{top:30%;}50%{top:70%;}}
  .corner{position:absolute;width:26px;height:26px;border-color:var(--accent);z-index:5;pointer-events:none;}
  .corner.tl{top:8%;left:8%;border-top:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:6px 0 0 0;}
  .corner.tr{top:8%;right:8%;border-top:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 6px 0 0;}
  .corner.bl{bottom:8%;left:8%;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:0 0 0 6px;}
  .corner.br{bottom:8%;right:8%;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 0 6px 0;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);padding:10px 16px;border-radius:10px;font-size:13px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:90%;text-align:center;}
  .link{color:var(--accent);background:none;border:none;font-family:inherit;font-size:13px;cursor:pointer;padding:0;}
  .section-title{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;font-family:'IBM Plex Mono',monospace;margin:4px 0 10px;}
  .config-warn{background:rgba(255,176,32,.1);border:1px solid var(--warn);color:var(--warn);border-radius:10px;padding:14px;font-size:13px;line-height:1.5;margin:16px;}
  .cover{width:44px;height:60px;border-radius:5px;object-fit:cover;background:var(--surface-2);flex-shrink:0;}
  .cover.square{width:60px;height:60px;}
</style>
</head>

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFseHd6ZXdkc3FoYXN6emNwa2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NjcyNDEsImV4cCI6MjA5OTQ0MzI0MX0.dxPCsqjkzYz0zzRVJ3zHcadYTSrdhqBxfvqNj_B-el4";

let sb = null;
let session = null;
const TYPE_LABELS = { book: 'KsiД…Ејka', movie: 'Film', music: 'Muzyka' };

function configured(){
  return SUPABASE_URL && !SUPABASE_URL.startsWith('TU_') && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith('TU_');
}

function escapeHtml(s){
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function icon(name){
  const icons = {
    scan: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10"/></svg>',
    list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',
    loans: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    movie: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M7 3v18M17 3v18M2 8h5M2 16h5M17 8h5M17 16h5"/></svg>',
    music: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
  };
  return icons[name] || '';
}

function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

// ---------------- BOOT ----------------
async function boot(){
  if (!configured()){
    renderNotConfigured();
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    global: { fetch: (url, options) => fetch(url, { ...options, cache: 'no-store' }) }
  });
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_e, s)=>{ session = s; render(); });
  if (session){ await loadAll(); }
  render();
}

function renderNotConfigured(){
  app.innerHTML = `
    <header class="topbar"><h1>Biblioteczka</h1></header>
    <div class="config-warn">
      <strong>Appka jeszcze nie jest podЕӮД…czona do bazy danych.</strong><br><br>
      UzupeЕӮnij <span class="mono">SUPABASE_URL</span> i <span class="mono">SUPABASE_ANON_KEY</span>
      na gГіrze pliku i uruchom <span class="mono">schema.sql</span> w SQL Editorze projektu Supabase.
    </div>`;
}

async function loadAll(){
  const [{data:items, error:itemsError}, {data:loans, error:loansError}] = await Promise.all([
    sb.from('items').select('*').order('title'),
    sb.from('loans').select('*').is('returned_at', null)
  ]);
  if (itemsError || loansError) toast('BЕӮД…d wczytywania danych: ' + (itemsError?.message || loansError?.message));
  state.items = items || [];
  state.loans = loans || [];
}

function activeLoanFor(itemId){
  return state.loans.find(l => l.item_id === itemId);
}

// ---------------- RENDER SHELL ----------------
function render(){
  if (!session){ renderLogin(); return; }
  app.innerHTML = `
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <img src="logo.svg" alt="Biblioteczka" style="width:32px;height:32px;border-radius:8px;">
        <div><h1>Biblioteczka</h1><div class="sub">${escapeHtml(session.user.email)}</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="icon-btn ${state.searchMode ? 'active' : ''}" onclick="toggleSearch()" title="Szukaj w kolekcji">${icon(state.searchMode ? 'x' : 'search')}</button>
        <button class="link" onclick="logout()">Wyloguj</button>
      </div>
    </header>
    <main id="main"></main>
    <nav class="bottom">
      ${navBtn('scan','Dodaj')}
      ${navBtn('list','Kolekcja')}
      ${navBtn('loans','WypoЕјyczenia')}
      ${navBtn('settings','Ustawienia')}
    </nav>
  `;
  renderTab();
}

function navBtn(tab,label){
  const active = state.tab===tab ? 'active' : '';
  const iconName = tab==='scan'?'scan':tab==='list'?'list':tab==='loans'?'loans':'settings';
  return `<button class="${active}" onclick="setTab('${tab}')">${icon(iconName)}<span>${label}</span></button>`;
}

async function setTab(tab){
  await stopScanner();
  state.tab = tab;
  state.scannedBarcode = null;
  state.scannedItem = null;
  state.lookup = null;
  state.loanScanning = false;
  state.selectMode = false;
  state.selectedIds = [];
  state.searchMode = false;
  state.searchQuery = '';
  localStorage.setItem('bib_tab', tab);
  if (tab === 'list' || tab === 'loans'){
    await loadAll(); // odЕӣwieЕј вҖ” inne urzД…dzenie (np. telefon) mogЕӮo coЕӣ dodaДҮ/zmieniДҮ
  }
  render();
}

function renderTab(){
  const main = document.getElementById('main');
  if (state.lookup && state.lookup.editingId){ renderAddForm(main); return; }
  if (state.searchMode){ renderSearch(main); return; }
  if (state.tab==='scan') renderScan(main);
  else if (state.tab==='list') renderList(main);
  else if (state.tab==='loans') renderLoans(main);
  else if (state.tab==='settings') renderSettings(main);
}

// ---------------- LOGIN ----------------
function renderLogin(){
  app.innerHTML = `
    <div style="max-width:340px;margin:80px auto;padding:0 20px;">
      <img src="logo.svg" alt="Biblioteczka" style="width:88px;height:88px;display:block;margin:0 auto 14px;">
      <h1 style="text-align:center;margin-bottom:4px;">Biblioteczka</h1>
      <div style="text-align:center;color:var(--text-dim);font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:24px;">katalog ksiД…Ејek, filmГіw i muzyki</div>
      <div class="card">
        <label>E-mail</label>
        <input id="login-email" type="email" placeholder="ty@przyklad.pl">

        <button class="btn" onclick="login()">Zaloguj siДҷ</button>
        <div id="login-err" style="color:var(--danger);font-size:12px;margin-top:10px;"></div>
      </div>
    </div>`;
}

async function login(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error){ document.getElementById('login-err').textContent = 'BЕӮДҷdny e-mail lub hasЕӮo.'; return; }
  await loadAll();
  render();
}

async function logout(){
  await sb.auth.signOut();
  render();
}

// ---------------- SCAN / DODAJ TAB ----------------
let html5Qr = null;
let scannerStarting = null;

function renderScan(main){
  if (state.lookup){
    renderAddForm(main);
    return;
  }
  // Kamera na telefonie (zwЕӮaszcza iOS) wymaga, Ејeby jej uruchomienie byЕӮo bezpoЕӣredniД…
  // reakcjД… na dotkniДҷcie ekranu вҖ” nie da siДҷ jej auto-odpaliДҮ zaraz po wejЕӣciu na zakЕӮadkДҷ.
  main.innerHTML = `
    <div class="card" style="text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:60vh;">
      <div class="scan-hint" style="margin-bottom:20px;">Dotknij, Ејeby uruchomiДҮ kamerДҷ</div>
      <button class="btn" style="max-width:280px;padding:32px;font-size:24px;letter-spacing:1px;" onclick="beginScan()">SKANUJ</button>
    </div>
    <div style="margin-top:14px;">
      <button class="btn secondary" onclick="manualBarcode()">Wpisz kod rДҷcznie</button>
      <button class="btn secondary" style="margin-top:8px;" onclick="skipBarcode()">Dodaj bez kodu</button>
    </div>
  `;
}

function beginScan(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="scan-frame">
      <div id="reader"></div>
      <div class="laser"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="scan-hint">Zeskanuj kod kreskowy okЕӮadki / pudeЕӮka</div>
    <div style="margin-top:14px;">
      <button class="btn secondary" onclick="manualBarcode()">Wpisz kod rДҷcznie</button>
      <button class="btn secondary" style="margin-top:8px;" onclick="skipBarcode()">Dodaj bez kodu</button>
    </div>
  `;
  startScanner();
}

function startScanner(onDecode){
  onDecode = onDecode || onBarcode;
  if (state.scannerRunning || scannerStarting) return scannerStarting;
  html5Qr = new Html5Qrcode("reader");
  scannerStarting = html5Qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    (decodedText)=>{ onDecode(decodedText); },
    ()=>{}
  ).then(()=>{ state.scannerRunning = true; }).catch(()=>{
    const readerEl = document.getElementById('reader');
    if (readerEl) readerEl.innerHTML = '<div class="empty">Brak dostДҷpu do kamery. SprawdЕә uprawnienia przeglД…darki albo wpisz kod rДҷcznie.</div>';
  }).finally(()=>{ scannerStarting = null; });
  return scannerStarting;
}

async function stopScanner(){
  if (scannerStarting) await scannerStarting;
  if (html5Qr && state.scannerRunning){
    state.scannerRunning = false;
    try { await html5Qr.stop(); await html5Qr.clear(); } catch(e){}
  }
  html5Qr = null;
}

function manualBarcode(){
  const code = prompt('Wpisz kod kreskowy:');
  if (code) onBarcode(code.trim());
}

function skipBarcode(){
  state.lookup = { barcode: null, type: 'book', title: '', creator: '', publisher: '', format: '', year: '', cover_url: '' };
  render();
}

// Sprawdza sumДҷ kontrolnД… kodu EAN-13/UPC-A/EAN-8 вҖ” jeЕӣli siДҷ nie zgadza, kamera
// prawie na pewno bЕӮДҷdnie odczytaЕӮa jednД… cyfrДҷ (czДҷste przy sЕӮabym Еӣwietle/pod kД…tem),
// wiДҷc nie ma sensu szukaДҮ takiego kodu w Ејadnej bazie.
function isValidBarcodeChecksum(code){
  if (!/^\d{8}$|^\d{12}$|^\d{13}$/.test(code)) return true; // nietypowa dЕӮugoЕӣДҮ - nie oceniamy
  const digits = code.split('').map(Number);
  const check = digits.pop();
  let sum = 0;
  // dla EAN-13/UPC-A/EAN-8: liczД…c od najmniej znaczД…cej cyfry (zaraz przed check digit),
  // wagi na przemian 3,1,3,1...
  digits.reverse().forEach((d, i) => { sum += d * (i % 2 === 0 ? 3 : 1); });
  const expected = (10 - (sum % 10)) % 10;
  return expected === check;
}

let lookupLog = [];
function logStep(source, status){
  lookupLog.push({ source, status });
}

async function onBarcode(code){
  await stopScanner();
  const existing = state.items.find(i => i.barcode === code);
  if (existing){
    toast('Ta pozycja jest juЕј w kolekcji');
    state.tab = 'list';
    localStorage.setItem('bib_tab', 'list');
    render();
    openItem(existing.id);
    return;
  }
  lookupLog = [];
  if (!isValidBarcodeChecksum(code)){
    toast(`Kod ${code} ma niepoprawnД… sumДҷ kontrolnД… вҖ” kamera prawdopodobnie Еәle odczytaЕӮa cyfrДҷ. Popraw go poniЕјej albo zeskanuj jeszcze raz.`);
  }
  let guess = { type: 'book', title: '', creator: '', publisher: '', format: '', year: '', cover_url: '' };
  if (isIsbn(code)){
    guess = await lookupBook(code) || guess;
  } else {
    guess = await lookupBarcodeGeneral(code) || guess;
  }
  state.lookup = { barcode: code, ...guess, debugLog: lookupLog, checksumOk: isValidBarcodeChecksum(code) };
  render();
}

function isIsbn(code){
  return /^97[89]\d{10}$/.test(code) || /^\d{9}[\dXx]$/.test(code);
}

function stripTrailingPunct(s){
  return (s||'').replace(/[\s:;,/]+$/, '').trim();
}

function cleanPublisherName(s){
  return stripTrailingPunct((s||'').trim()).replace(/^["'вҖһ]+|["'вҖқ]+$/g, '').trim();
}

// Bibioteka Narodowa udostДҷpnia pola MARC вҖ” pole 245 (tytuЕӮ), 100 (gЕӮГіwny autor) i 260/264
// (wydawca, podpole b) sД… duЕјo dokЕӮadniejsze niЕј spЕӮaszczone pola z odpowiedzi.
function parseBnMarc(bib){
  const fields = (bib.marc && bib.marc.fields) || [];
  let title = '';
  let publisher = '';
  const authors = [];
  for (const f of fields){
    if (f['245'] && !title){
      const sub = f['245'].subfields || [];
      const aPart = sub.find(s => s.a)?.a;
      if (aPart) title = stripTrailingPunct(aPart);
    }
    if (f['100']){
      const sub = f['100'].subfields || [];
      const aPart = sub.find(s => s.a)?.a;
      if (aPart) authors.push(stripTrailingPunct(aPart));
    }
    if ((f['260'] || f['264']) && !publisher){
      const sub = (f['260'] || f['264']).subfields || [];
      const bPart = sub.find(s => s.b)?.b;
      if (bPart) publisher = cleanPublisherName(bPart);
    }
  }
  return {
    title: title || cleanBnTitleFallback(bib.title),
    creator: authors.length ? authors.join('; ') : (bib.author || ''),
    publisher: publisher || cleanPublisherName(bib.publisher || '')
  };
}

function cleanBnTitleFallback(t){
  if (!t) return '';
  return stripTrailingPunct(t.split(' / ')[0]);
}

// Google Books ma zaskakujД…co dobre pokrycie okЕӮadek nawet dla polskich wydaЕ„, ktГіrych
// nie ma Open Library вҖ” sprawdzamy to zawsze jako dodatkowe ЕәrГіdЕӮo okЕӮadki dla ksiД…Ејek.
async function fetchGoogleBooksCover(isbn){
  try {
    const res = await fetch(`${FUNCTIONS_BASE}/google-books?isbn=${encodeURIComponent(isbn)}`);
    const data = await res.json();
    const v = data.items && data.items[0] && data.items[0].volumeInfo;
    const url = v && v.imageLinks ? (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail || '') : '';
    return url.replace(/^http:/, 'https:');
  } catch(e){ return ''; }
}

async function lookupBook(code){
  // 1. Biblioteka Narodowa (najlepsze pokrycie polskich wydaЕ„)
  try {
    const res = await fetch(`${FUNCTIONS_BASE}/bn-lookup?isbn=${encodeURIComponent(code)}`);
    const data = await res.json();
    const b = data.bibs && data.bibs[0];
    if (b){
      logStep('Biblioteka Narodowa', 'znaleziono');
      toast('Znaleziono dane ksiД…Ејki (Biblioteka Narodowa)');
      const parsed = parseBnMarc(b);
      // BN nie udostДҷpnia okЕӮadek вҖ” prГіbujemy Google Books, a jak nie ma, Open Library
      const gbCover = await fetchGoogleBooksCover(code);
      return {
        type: 'book',
        title: parsed.title,
        creator: parsed.creator,
        publisher: parsed.publisher,
        format: 'papierowa miДҷkka',
        year: b.publicationYear ? (String(b.publicationYear).match(/\d{4}/)||[])[0]||'' : '',
        cover_url: gbCover || `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(code)}-M.jpg?default=false`
      };
    }
    logStep('Biblioteka Narodowa', 'nie znaleziono');
  } catch(e){ logStep('Biblioteka Narodowa', 'bЕӮД…d sieci'); }
  // 2. Open Library
  try {
    const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${encodeURIComponent(code)}&format=json&jscmd=data`);
    const data = await res.json();
    const b = data[`ISBN:${code}`];
    if (b){
      logStep('Open Library', 'znaleziono');
      toast('Znaleziono dane ksiД…Ејki (Open Library)');
      const gbCover = await fetchGoogleBooksCover(code);
      return {
        type: 'book',
        title: b.title || '',
        creator: (b.authors||[]).map(a=>a.name).join(', '),
        publisher: (b.publishers||[]).map(p=>p.name).join(', '),
        format: 'papierowa miДҷkka',
        year: b.publish_date ? (b.publish_date.match(/\d{4}/)||[])[0]||'' : '',
        cover_url: gbCover || `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(code)}-M.jpg?default=false`
      };
    }
    logStep('Open Library', 'nie znaleziono');
  } catch(e){ logStep('Open Library', 'bЕӮД…d sieci'); }
  // 3. Google Books (fallback, np. dla wydaЕ„ spoza Open Library/BN)
  try {
    const res = await fetch(`${FUNCTIONS_BASE}/google-books?isbn=${encodeURIComponent(code)}`);
    const data = await res.json();
    const v = data.items && data.items[0] && data.items[0].volumeInfo;
    if (v){
      logStep('Google Books', 'znaleziono');
      toast('Znaleziono dane ksiД…Ејki (Google Books)');
      return {
        type: 'book',
        title: v.title || '',
        creator: (v.authors||[]).join(', '),
        publisher: v.publisher || '',
        format: 'papierowa miДҷkka',
        year: v.publishedDate ? (v.publishedDate.match(/\d{4}/)||[])[0]||'' : '',
        cover_url: v.imageLinks ? (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail || '').replace(/^http:/, 'https:') : ''
      };
    }
    logStep('Google Books', 'nie znaleziono');
  } catch(e){ logStep('Google Books', 'bЕӮД…d sieci'); }
  return null;
}

function detectMovieFormat(text){
  if (/\b(blu[\s-]?ray|bd)\b/i.test(text) || /\b4k\s?u?hd\b/i.test(text)) return 'Blu-ray';
  if (/\bvhs\b/i.test(text)) return 'VHS';
  if (/\bdvd\b/i.test(text)) return 'DVD';
  return '';
}
function detectMusicFormat(text){
  if (/\b(vinyl|lp)\b/i.test(text)) return 'winyl';
  if (/\bcd\b/i.test(text)) return 'CD';
  return '';
}

// UPCitemdb (darmowa baza) czДҷsto zwraca tytuЕӮ Ејywcem z ogЕӮoszenia na aukcji
// (eBay itp.) вҖ” usuwamy typowe Еӣmieci sprzedaЕјowe, kody i etykiety formatu,
// Ејeby w polu tytuЕӮu zostaЕӮo samo "co to jest".
const LISTING_NOISE = [
  /free\s*shipping/gi, /fast\s*shipping/gi, /ships?\s*(fast|free|next\s*day|same\s*day)/gi,
  /us\s*seller/gi, /brand\s*new/gi, /new\s*sealed/gi, /factory\s*sealed/gi,
  /still\s*sealed/gi, /\bsealed\b/gi, /pre-?owned/gi, /like\s*new/gi,
  /very\s*good\s*condition/gi, /good\s*condition/gi, /excellent\s*condition/gi,
  /tested\s*(and\s*)?works?\s*(great|perfect|fine)?/gi, /\bworks?\s*(great|perfect|fine)\b/gi,
  /case\s*included/gi, /no\s*scratch(es)?/gi, /scratch\s*free/gi,
  /\bauthentic\b/gi, /\bgenuine\b/gi, /\brare\b/gi, /\bhtf\b/gi,
  /out\s*of\s*print/gi, /\boop\b/gi,
  /region\s*free/gi, /region\s*[0-9]\b/gi,
  /widescreen/gi, /fullscreen/gi, /full\s*screen/gi,
  /\bnew\b/gi, /\bused\b/gi, /\bmint\b/gi, /\bnib\b/gi, /\bnwt\b/gi,
  /combo\s*pack/gi, /\blot\s*of\s*\d+\b/gi, /\blot\b/gi,
  /\d+[\s-]?disc(s)?(\s*set)?\b/gi, /special\s*edition/gi, /collector'?s?\s*edition/gi,
  /anniversary\s*edition/gi,
  /\b4k\b/gi, /\buhd\b/gi, /\bblu[\s-]?rays?\b/gi, /\bdvds?\b/gi, /\bvhs\b/gi
];

// Etykietowane kody (UPC 012345678905, SKU: ABC-123, ASIN B00XYZ...) i goЕӮe dЕӮugie
// numery (kody kreskowe/SKU majД… zwykle 6+ cyfr вҖ” realne tytuЕӮy rzadko majД… tak dЕӮugie liczby)
const CODE_LABEL_RE = /\b(upc|ean|isbn|asin|sku|mpn|model)\s*[:#]?\s*[a-z0-9-]{4,}\b/gi;
const BARE_CODE_RE = /\b\d{6,}\b/g;
const DECOR_CHARS_RE = /[вҳ…вҳҶв—Ҹв—Ӣв—Ҷв—Үв– в–Ўв–Ів–јвңҰвң§вҷҰвҷҘ~_*]+/g;

function cleanListingTitle(text){
  const original = (text || '').trim();
  let t = original;
  t = t.split(' | ')[0]; // wiele ogЕӮoszeЕ„ ma format "TytuЕӮ | Format | Free Shipping | ..."
  t = t.replace(/[\[(][^\])]*[\])]/g, ' '); // usuЕ„ nawiasy z dopiskami
  t = t.replace(DECOR_CHARS_RE, ' ');
  t = t.replace(CODE_LABEL_RE, ' ');
  t = t.replace(BARE_CODE_RE, ' ');
  for (const re of LISTING_NOISE) t = t.replace(re, ' ');
  t = t.replace(/(?:\s*[-вҖ“вҖ”:|,])+\s*$/, '').replace(/^\s*(?:[-вҖ“вҖ”:|,]\s*)+/, '');
  t = t.replace(/\s{2,}/g, ' ').trim();
  return t || original; // jeЕӣli wyczyЕӣciliЕӣmy wszystko, zostaw oryginaЕӮ do rДҷcznej poprawki
}

// MusicBrainz вҖ” darmowa, community'owa baza wydaЕ„ muzycznych (dobre pokrycie miДҷdzynarodowe,
// duЕјo lepsze niЕј UPCitemdb dla pЕӮyt spoza USA). ObsЕӮuguje CORS bezpoЕӣrednio z przeglД…darki.
// OkЕӮadka z Cover Art Archive (coverartarchive.org) вҖ” kwadratowa miniaturka po MBID wydania.
function detectMusicFormatFromMedia(media){
  const fmt = ((media && media.format) || '').toLowerCase();
  if (/vinyl|lp/.test(fmt)) return 'winyl';
  if (/cd/.test(fmt)) return 'CD';
  return '';
}

function mbArtistNames(release){
  return ((release['artist-credit']) || [])
    .map(a => a.name || (a.artist && a.artist.name))
    .filter(Boolean)
    .join(', ');
}

async function lookupMusicBrainzByBarcode(code){
  try {
    const res = await fetch(`https://musicbrainz.org/ws/2/release/?query=barcode:${encodeURIComponent(code)}&fmt=json&limit=1`);
    const data = await res.json();
    const r = data.releases && data.releases[0];
    if (!r){ logStep('MusicBrainz', 'nie znaleziono'); return null; }
    logStep('MusicBrainz', 'znaleziono');
    toast('Znaleziono dane pЕӮyty (MusicBrainz)');
    return {
      type: 'music',
      title: r.title || '',
      creator: mbArtistNames(r),
      format: detectMusicFormatFromMedia(r.media && r.media[0]),
      year: r.date ? (r.date.match(/\d{4}/)||[])[0]||'' : '',
      cover_url: `https://coverartarchive.org/release/${r.id}/front-250`
    };
  } catch(e){ logStep('MusicBrainz', 'bЕӮД…d sieci'); return null; }
}

// Discogs вҖ” kolekcjonerska baza wydaЕ„ muzycznych, Еӣwietne pokrycie niszowych/regionalnych
// (np. polskich) pЕӮyt, ktГіrych nie ma ani MusicBrainz, ani UPCitemdb. ObsЕӮuguje CORS.
async function lookupDiscogsByBarcode(code){
  try {
    const res = await fetch(`https://api.discogs.com/database/search?barcode=${encodeURIComponent(code)}&type=release`);
    const data = await res.json();
    const r = data.results && data.results[0];
    if (!r){ logStep('Discogs', 'nie znaleziono'); return null; }
    let detail = null;
    try { detail = await fetch(r.resource_url).then(x => x.json()); } catch(e){ /* zostaniemy przy skrГіconych danych */ }
    const title = (detail && detail.title) || (r.title||'').split(' - ').slice(1).join(' - ') || r.title || '';
    const creator = (detail && detail.artists && detail.artists.map(a=>a.name).join(', ')) || (r.title||'').split(' - ')[0] || '';
    const formatText = (detail && detail.formats && detail.formats[0] && detail.formats[0].name) || (r.format && r.format[0]) || '';
    const format = /vinyl/i.test(formatText) ? 'winyl' : /cd/i.test(formatText) ? 'CD' : '';
    const year = String((detail && detail.year) || r.year || '').match(/\d{4}/)?.[0] || '';
    const img = (detail && detail.images && detail.images[0] && (detail.images[0].uri150 || detail.images[0].uri)) || '';
    logStep('Discogs', 'znaleziono');
    toast('Znaleziono dane pЕӮyty (Discogs)');
    return { type: 'music', title, creator, format, year, cover_url: img };
  } catch(e){ logStep('Discogs', 'bЕӮД…d sieci'); return null; }
}

async function lookupBarcodeGeneral(code){
  // 1. MusicBrainz po kodzie kreskowym (najlepsze pokrycie dla pЕӮyt CD/winyl)
  const mb = await lookupMusicBrainzByBarcode(code);
  if (mb) return mb;
  // 2. Discogs вҖ” jeЕӣli MusicBrainz nie znalazЕӮ (niszowe/regionalne wydania)
  const discogs = await lookupDiscogsByBarcode(code);
  if (discogs) return discogs;
  // 3. UPCitemdb - darmowe wyszukiwanie po kodzie EAN/UPC (limit ok. 100 zapytaЕ„/dzieЕ„, bez klucza)
  // WoЕӮane przez nasz proxy (netlify/functions/upc-lookup.mjs), bo UPCitemdb blokuje CORS z przeglД…darki.
  try {
    const res = await fetch(`${FUNCTIONS_BASE}/upc-lookup?upc=${encodeURIComponent(code)}`);
    const data = await res.json();
    const item = data.items && data.items[0];
    if (item){
      const cat = (item.category || '').toLowerCase();
      const title = (item.title || '').toLowerCase();
      const isMusic = /music|vinyl|audio cd|album/.test(cat) || /vinyl|soundtrack/.test(title);
      const type = isMusic ? 'music' : 'movie';
      const format = type === 'movie' ? detectMovieFormat(item.title||'') : detectMusicFormat(item.title||'');
      const cleanTitle = cleanListingTitle(item.title||'');
      let guess = {
        type,
        title: cleanTitle || item.title || '',
        creator: item.brand || '',
        format,
        year: (item.title||'').match(/\b(19|20)\d{2}\b/)?.[0] || '',
        cover_url: (item.images && item.images[0]) || ''
      };
      logStep('UPCitemdb', 'znaleziono');
      toast('Znaleziono dane w bazie kodГіw kreskowych вҖ” sprawdЕә i popraw w razie potrzeby');
      if (type === 'movie'){
        const omdb = await lookupMovieDetails(cleanTitle);
        if (omdb) guess = { ...guess, ...omdb };
      }
      return guess;
    }
    logStep('UPCitemdb', 'nie znaleziono');
  } catch(e){ logStep('UPCitemdb', 'bЕӮД…d sieci'); }
  toast('Nie znaleziono tego kodu w Ејadnej bazie вҖ” wyszukaj tytuЕӮ rДҷcznie poniЕјej');
  return { type: 'movie', title: '', creator: '', format: '', year: '', cover_url: '' };
}

async function lookupMovieDetails(title){
  if (!title) return null;
  try {
    const res = await fetch(`${FUNCTIONS_BASE}/omdb?t=${encodeURIComponent(title)}&type=movie`);
    const data = await res.json();
    if (data.Response === 'True'){
      logStep('OMDb', 'znaleziono');
      toast('Znaleziono reЕјysera, rok premiery i plakat (OMDb)');
      return {
        title: data.Title || title,
        creator: data.Director && data.Director !== 'N/A' ? data.Director : '',
        year: data.Year ? (data.Year.match(/\d{4}/)||[])[0]||'' : '',
        cover_url: data.Poster && data.Poster !== 'N/A' ? data.Poster : undefined
      };
    }
    logStep('OMDb', 'nie znaleziono po tytule "' + title + '"');
  } catch(e){ logStep('OMDb', 'bЕӮД…d sieci'); }
  // Zapasowo TMDb вҖ” czasem trafia tam, gdzie OMDb nie (i ma polskie tytuЕӮy)
  try {
    const results = await searchTmdbTitles(title);
    const r = results && results[0];
    if (r){
      const detail = await fetch(`${FUNCTIONS_BASE}/tmdb?i=${encodeURIComponent(r.id)}`).then(x => x.json()).catch(() => null);
      const director = detail && detail.credits && detail.credits.crew ? detail.credits.crew.find(c => c.job === 'Director') : null;
      logStep('TMDb', 'znaleziono');
      toast('Znaleziono dane filmu (TMDb)');
      return {
        title: (detail && detail.title) || r.title || title,
        creator: director ? director.name : '',
        year: (detail && detail.release_date) ? detail.release_date.slice(0,4) : (r.release_date||'').slice(0,4),
        cover_url: (detail && detail.poster_path) ? `https://image.tmdb.org/t/p/w342${detail.poster_path}` : (r.poster_path ? `https://image.tmdb.org/t/p/w342${r.poster_path}` : undefined)
      };
    }
    logStep('TMDb', 'nie znaleziono po tytule "' + title + '"');
  } catch(e){ logStep('TMDb', 'bЕӮД…d sieci'); }
  return null;
}

async function uploadCoverFile(){
  const fileEl = document.getElementById('f-cover-file');
  const file = fileEl.files && fileEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById('cover-upload-status');
  statusEl.textContent = 'WgrywamвҖҰ';
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
  const path = `${session.user.id}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
  const { error: uploadError } = await sb.storage.from('covers').upload(path, file, { upsert: false });

    statusEl.textContent = '';
    toast('BЕӮД…d wgrywania: ' + uploadError.message);
    return;
  }
  const { data } = sb.storage.from('covers').getPublicUrl(path);
  state.lookup.cover_url = data.publicUrl;
  toast('Wgrano okЕӮadkДҷ');
  render();
}

async function saveItem(){
  const l = state.lookup;
  const title = document.getElementById('f-title').value.trim();
  if (!title){ toast('Podaj tytuЕӮ'); return; }
  const barcodeEl = document.getElementById('f-barcode');
  const indexEl = document.getElementById('f-index');
  const publisherEl = document.getElementById('f-publisher');
  const payload = {
    barcode: (barcodeEl ? barcodeEl.value.trim() : l.barcode) || null,
    index_number: (indexEl ? indexEl.value.trim() : '') || null,
    publisher: (publisherEl ? publisherEl.value.trim() : '') || null,
    type: document.getElementById('f-type').value,
    title,
    creator: document.getElementById('f-creator').value.trim() || null,
    format: document.getElementById('f-format').value.trim() || null,
    year: parseInt(document.getElementById('f-year').value) || null,
    cover_url: l.cover_url || null
  };
  if (!l.editingId){
    const dup = state.items.find(i =>
      (payload.barcode && i.barcode === payload.barcode) ||
      (i.title.trim().toLowerCase() === title.toLowerCase() && (i.creator||'').trim().toLowerCase() === (payload.creator||'').trim().toLowerCase())
    );
    if (dup){
      toast(`"${dup.title}" juЕј masz w kolekcji рҹ“ҡ вҖ” otwieram tДҷ pozycjДҷ`);
      state.lookup = null;
      render();
      openItem(dup.id);
      return;
    }
  }
  const { error } = l.editingId
    ? await sb.from('items').update(payload).eq('id', l.editingId)
    : await sb.from('items').insert(payload);
  if (error){ toast('BЕӮД…d zapisu: ' + error.message); return; }
  await loadAll();
  const wasEditing = l.editingId;
  state.lookup = null;
  toast(wasEditing ? 'Zapisano zmiany' : 'Dodano do kolekcji');
  render();
}

}

    return `
      <div class="badge ok" style="margin-bottom:12px;">DostДҷpne</div>
      <input id="borrower-name" placeholder="${isIn ? 'Od kogo poЕјyczyЕӮeЕӣ?' : 'Komu poЕјyczasz?'}">
      <label>Data poЕјyczenia</label>
      <input type="date" id="borrow-date" value="${todayIso()}">
      <button class="btn" onclick="lendItem('${item.id}','${mode}')">${isIn ? 'Zapisz' : 'PoЕјycz'}</button>
      <button class="btn secondary" style="margin-top:8px;" onclick="cancelLendMode('${item.id}')">Anuluj</button>
    `;
  }
  return `
    <div class="badge ok" style="margin-bottom:12px;">DostДҷpne</div>
    <button class="btn" onclick="setLendMode('${item.id}','out')">PoЕјycz komuЕӣ</button>
    <button class="btn secondary" style="margin-top:8px;" onclick="setLendMode('${item.id}','in')">Zarejestruj jako poЕјyczone od kogoЕӣ</button>
  `;
}

function setLendMode(itemId, mode){
  state.lendMode = mode;
  openItem(itemId);
}

function cancelLendMode(itemId){
  state.lendMode = null;
  openItem(itemId);
}

async function lendItem(itemId, direction){
  const name = document.getElementById('borrower-name').value.trim();
  if (!name){ toast(direction === 'in' ? 'Podaj od kogo poЕјyczyЕӮeЕӣ' : 'Podaj komu poЕјyczasz'); return; }
  const dateVal = document.getElementById('borrow-date').value || todayIso();
  const borrowed_at = new Date(dateVal + 'T12:00:00').toISOString();
  const { error } = await sb.from('loans').insert({ item_id: itemId, borrower_name: name, borrowed_at, direction });
  if (error){ toast('BЕӮД…d: ' + error.message); return; }
  await loadAll();
  state.lendMode = null;
  toast(direction === 'in' ? 'Zarejestrowano jako poЕјyczone' : 'Zapisano wypoЕјyczenie');
  openItem(itemId);
}

async function updateLoanDate(loanId, itemId){
  const dateVal = document.getElementById('loan-date-input').value;
  if (!dateVal) return;
  const borrowed_at = new Date(dateVal + 'T12:00:00').toISOString();
  const { error } = await sb.from('loans').update({ borrowed_at }).eq('id', loanId);
  if (error){ toast('BЕӮД…d: ' + error.message); return; }
  await loadAll();
  toast('Zaktualizowano datДҷ poЕјyczenia');
  openItem(itemId);
}

async function returnLoan(loanId){
  const loan = state.loans.find(l => l.id === loanId);
  const { error } = await sb.from('loans').update({ returned_at: new Date().toISOString() }).eq('id', loanId);
  if (error){ toast('BЕӮД…d: ' + error.message); return; }
  await loadAll();
  toast(loan && loan.direction === 'in' ? 'Oznaczono jako oddane wЕӮaЕӣcicielowi' : 'Oznaczono zwrot');
  renderTab();
}

async function deleteItem(itemId){
  if (!confirm('Na pewno usunД…ДҮ tДҷ pozycjДҷ z kolekcji?')) return;
  const { error } = await sb.from('items').delete().eq('id', itemId);
  if (error){ toast('BЕӮД…d: ' + error.message); return; }
  await loadAll();
  state.lookup = null;
  toast('UsuniДҷto');
  renderTab();
}

function editItem(id){
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  state.lookup = {
    editingId: item.id,
    barcode: item.barcode || null,
    type: item.type,
    title: item.title || '',
    creator: item.creator || '',
    format: item.format || '',
    year: item.year || '',
    cover_url: item.cover_url || '',
    index_number: item.index_number || '',
    publisher: item.publisher || '',
    checksumOk: item.barcode ? isValidBarcodeChecksum(item.barcode) : true,
    debugLog: []
  };
  render();
}

// ---------------- WYPOЕ»YCZENIA TAB ----------------
function renderLoans(main){
  if (state.loanScanning){
    main.innerHTML = `
      <div class="scan-frame">
        <div id="reader"></div>
        <div class="laser"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
      <div class="scan-hint">Zeskanuj kod, Ејeby oznaczyДҮ zwrot</div>
      <div style="margin-top:14px;">
        <button class="btn secondary" onclick="cancelLoanScan()">Anuluj</button>
      </div>
    `;
    startScanner(onLoanBarcode);
    return;
  }
  const scanBtn = `<button class="btn secondary" style="margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;" onclick="startLoanScan()">${icon('scan')} Zeskanuj do zwrotu</button>`;

  const toolbar = `
    <div class="row" style="margin-bottom:12px;">
      <button class="btn secondary" onclick="setTab('scan')">+ Dodaj pozycjДҷ</button>
      <button class="btn small secondary" style="flex:0 0 auto;" onclick="toggleLoanSelectMode()">${state.loanSelectMode ? 'Gotowe' : 'Zaznacz'}</button>
    </div>
    ${state.loanSelectMode ? `
      <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;padding:12px;">
        <span class="meta">Zaznaczono: ${state.selectedLoanIds.length}</span>
        <div style="display:flex;gap:8px;">
          <button class="btn small secondary" onclick="cancelLoanSelectMode()">Anuluj</button>
          <button class="btn small" onclick="bulkReturnLoans()" ${state.selectedLoanIds.length===0?'disabled':''}>ZakoЕ„cz zaznaczone</button>
        </div>
      </div>
    ` : ''}
    <div class="tabs">
      ${['all','book','movie','music'].map(t=>`<button class="${state.loanTypeFilter===t?'active':''}" onclick="setLoanTypeFilter('${t}')">${t==='all'?'Wszystko':TYPE_LABELS[t]}</button>`).join('')}
    </div>
  `;

  if (state.loans.length===0){
    main.innerHTML = `${scanBtn}${toolbar}<div class="card"><div class="empty">Nic obecnie nie jest poЕјyczone.</div></div>`;
    return;
  }

  const filtered = state.loanTypeFilter==='all' ? state.loans : state.loans.filter(l=>{
    const item = state.items.find(i=>i.id===l.item_id);
    return item && item.type === state.loanTypeFilter;
  });
  const lentOut = filtered.filter(l => l.direction !== 'in');
  const borrowedIn = filtered.filter(l => l.direction === 'in');

  const loanRow = (l, returnLabel) => {
    const item = state.items.find(i=>i.id===l.item_id);
    const checked = state.selectedLoanIds.includes(l.id);
    return `<div class="item-row" onclick="${state.loanSelectMode ? `toggleSelectLoan('${l.id}')` : `openItem('${l.item_id}')`}">
      ${state.loanSelectMode ? `<input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggleSelectLoan('${l.id}')" style="width:18px;height:18px;flex-shrink:0;margin:0;">` : ''}
      ${item && item.cover_url ? coverImg(item.cover_url, null, item.type) : `<div class="cover${item && item.type==='music'?' square':''}" style="display:flex;align-items:center;justify-content:center;color:var(--text-dim);">${icon(item ? item.type : 'book')}</div>`}
      <div style="flex:1;">
        <div class="name">${escapeHtml(item ? item.title : 'вҖ”')}</div>
        <div class="meta">${l.direction==='in'?'od':'u'}: ${escapeHtml(l.borrower_name)} В· od ${new Date(l.borrowed_at).toLocaleDateString('pl-PL')}</div>
      </div>
      ${state.loanSelectMode ? '' : `<button class="btn small secondary" style="flex:0 0 auto;" onclick="event.stopPropagation();returnLoan('${l.id}')">${returnLabel}</button>`}
    </div>`;
  };

  main.innerHTML = `
    ${scanBtn}
    ${toolbar}
    ${lentOut.length===0 && borrowedIn.length===0 ? `<div class="card"><div class="empty">Brak poЕјyczek w tej kategorii.</div></div>` : ''}
    ${lentOut.length ? `
      <div class="section-title">WypoЕјyczone innym</div>
      <div class="card">${lentOut.map(l => loanRow(l, 'Zwrot')).join('')}</div>
    ` : ''}
    ${borrowedIn.length ? `
      <div class="section-title">PoЕјyczone od kogoЕӣ</div>
      <div class="card">${borrowedIn.map(l => loanRow(l, 'Oddane')).join('')}</div>
    ` : ''}
  `;
}

function toggleLoanSelectMode(){
  state.loanSelectMode = !state.loanSelectMode;
  if (!state.loanSelectMode) state.selectedLoanIds = [];
  renderTab();
}

function cancelLoanSelectMode(){
  state.loanSelectMode = false;
  state.selectedLoanIds = [];
  renderTab();
}

function toggleSelectLoan(id){
  const idx = state.selectedLoanIds.indexOf(id);
  if (idx === -1) state.selectedLoanIds.push(id); else state.selectedLoanIds.splice(idx, 1);
  renderTab();
}

function setLoanTypeFilter(t){
  state.loanTypeFilter = t;
  renderTab();
}

async function bulkReturnLoans(){
  if (state.selectedLoanIds.length === 0) return;
  if (!confirm(`OznaczyДҮ ${state.selectedLoanIds.length} poЕјyczek jako zakoЕ„czone?`)) return;
  const { error } = await sb.from('loans').update({ returned_at: new Date().toISOString() }).in('id', state.selectedLoanIds);
  if (error){ toast('BЕӮД…d: ' + error.message); return; }
  await loadAll();
  toast(`ZakoЕ„czono ${state.selectedLoanIds.length} poЕјyczek`);
  state.loanSelectMode = false;
  state.selectedLoanIds = [];
  renderTab();
}

function startLoanScan(){
  state.loanScanning = true;
  renderTab();
}

async function cancelLoanScan(){
  await stopScanner();
  state.loanScanning = false;
  renderTab();
}

async function onLoanBarcode(code){
  await stopScanner();
  state.loanScanning = false;
  const item = state.items.find(i => i.barcode === code);
  if (!item){
    toast('Nie znaleziono takiej pozycji w kolekcji');
    renderTab();
    return;
  }
  const loan = activeLoanFor(item.id);
  if (!loan){
    toast('Ta pozycja nie jest obecnie wypoЕјyczona');
    state.tab = 'list';
    localStorage.setItem('bib_tab', 'list');
    render();
    openItem(item.id);
    return;
  }
  await returnLoan(loan.id);
}

// ---------------- USTAWIENIA TAB ----------------
function renderSettings(main){
  main.innerHTML = `
    <div class="card">
      <div class="section-title">Konto</div>
      <div class="meta" style="margin-bottom:14px;">${escapeHtml(session.user.email)}</div>
      <button class="btn secondary" onclick="logout()">Wyloguj siДҷ</button>
    </div>
    <div class="card">
      <div class="section-title">Statystyki</div>
      <div class="meta">Pozycji w kolekcji: ${state.items.length}</div>
      <div class="meta">Aktualnie poЕјyczone: ${state.loans.length}</div>
      <div class="meta">WypoЕјyczone innym: ${state.loans.filter(l=>l.direction!=='in').length}</div>
      <div class="meta">PoЕјyczone od kogoЕӣ: ${state.loans.filter(l=>l.direction==='in').length}</div>
    </div>
  `;
}

document.addEventListener('DOMContentLoaded', boot);

// Gdy wracasz do karty/appki (np. z innego urzД…dzenia dodano coЕӣ w miДҷdzyczasie) вҖ” odЕӣwieЕј dane.
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && session){
    await loadAll();
    if (state.tab === 'list' || state.tab === 'loans') renderTab();
  }
});
</script>
</body>
</html>
